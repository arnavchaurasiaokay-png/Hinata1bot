name: Mongo Backup

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install MongoDB Tools (manual)
        run: |
          wget https://fastdl.mongodb.org/tools/db/mongodb-database-tools-ubuntu2204-x86_64-100.9.4.tgz
          tar -xvzf mongodb-database-tools-*.tgz
          sudo mv mongodb-database-tools-*/bin/* /usr/local/bin/

      - name: Create Backup Folder
        run: mkdir backup

      - name: Run MongoDB Backup
        run: mongodump --uri="${{ secrets.MONGO_URI }}" --out=backup

      - name: Zip Backup
        run: zip -r backup.zip backup

      - name: Upload Backup
        uses: actions/upload-artifact@v4
        with:
          name: mongodb-backup
          path: backup.zip
